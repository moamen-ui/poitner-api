name: Publish API clients

# Generates the typed client packages from the live API's Swagger spec and
# publishes them to GitHub Packages (npm.pkg.github.com) under @moamen-ui.
#
# Triggers:
#   - workflow_dispatch  — run from the Actions tab (optionally pin a version)
#   - repository_dispatch (type: api-deployed) — fired after an API deploy
# When no version is given, the next PATCH after the latest published version is used.
on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (blank = auto-bump patch)
        required: false
        default: ''
  repository_dispatch:
    types: [api-deployed]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@moamen-ui'

      - run: npm ci

      - name: Resolve version (explicit input, or auto-bump patch)
        id: ver
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          V="${{ github.event.inputs.version }}"
          if [ -z "$V" ]; then
            CUR=$(npm view @moamen-ui/pointer-angular version 2>/dev/null || echo "0.0.0")
            V=$(node -e "const [a,b,c]=(process.argv[1]||'0.0.0').split('.').map(Number); console.log(\`\${a}.\${b}.\${(c||0)+1}\`)" "$CUR")
            echo "Auto-bump: $CUR → $V"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Generate clients from the live API spec
        env:
          POINTER_SWAGGER_URL: https://api.pointer.moamen.work/swagger/v1/swagger.json
          CLIENTS_VERSION: ${{ steps.ver.outputs.version }}
        run: npm run generate-clients

      - name: Compile clients (tsc + ng-packagr)
        env:
          CLIENTS_VERSION: ${{ steps.ver.outputs.version }}
        run: npm run build-clients

      - name: Publish each client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # react/vue: package.json at the client root (files: [dist]); angular: ng-packagr dist
          for d in clients/react clients/vue clients/angular/dist; do
            echo "::group::publish $d"
            (cd "$d" && npm publish)
            echo "::endgroup::"
          done

      - name: Summary
        run: echo "Published @moamen-ui/pointer-{angular,react,vue}@${{ steps.ver.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
