<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root { --b:#2563eb; --g:#16a34a; --ink:#0f172a; --mut:#64748b; --bd:#e2e8f0; }
    body { font-family: system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; width: 320px; margin: 0; padding: 16px; color: var(--ink); }
    h1 { font-size: 15px; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--mut); margin: 10px 0 4px; }
    input, select { width: 100%; box-sizing: border-box; padding: 8px 10px; border: 1px solid var(--bd); border-radius: 8px; font-size: 13px; }
    button { width: 100%; padding: 9px; border: none; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer; margin-top: 12px; }
    .primary { background: linear-gradient(135deg, var(--g), var(--b)); color: #fff; }
    .ghost { background: #f1f5f9; color: var(--ink); }
    .danger { background: #fef2f2; color: #dc2626; }
    .who { font-size: 13px; font-weight: 700; }
    .dom { font-size: 12px; color: var(--mut); word-break: break-all; margin-top: 2px; }
    .err { color: #dc2626; font-size: 12px; margin-top: 8px; min-height: 14px; }
    .note { font-size: 11px; color: var(--mut); margin-top: 6px; line-height: 1.4; }
    a { color: var(--b); font-size: 12px; cursor: pointer; }
    .bar { display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>
  <h1>🐕 Pointer Feedback</h1>
  <div id="root">Loading…</div>
  <div class="err" id="err"></div>
  <script src="popup.js"></script>
</body>
</html>
