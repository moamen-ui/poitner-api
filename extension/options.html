<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Pointer Feedback — Options</title>
  <style>
    body { font-family: system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; max-width: 460px; margin: 40px auto; padding: 0 20px; color: #0f172a; }
    h1 { font-size: 18px; } label { display: block; font-weight: 600; font-size: 13px; margin: 16px 0 4px; color: #475569; }
    input { width: 100%; box-sizing: border-box; padding: 9px 11px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; }
    button { margin-top: 16px; padding: 9px 16px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; background: #2563eb; color: #fff; }
    .ok { color: #16a34a; font-size: 13px; margin-left: 10px; }
    .note { color: #64748b; font-size: 12px; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>🐕 Pointer Feedback — Options</h1>
  <label>Default Pointer server</label>
  <input id="server" placeholder="https://api.pointer.example.com" />
  <div class="note">The Pointer API this extension talks to. Set once; used for login and the injected widget.</div>
  <div><button id="save">Save</button><span class="ok" id="ok"></span></div>
  <script src="options.js"></script>
</body>
</html>
